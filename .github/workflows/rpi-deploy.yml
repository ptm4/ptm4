#rpi-deploy-yml
name: Deploy RPI Stack

on:
  push:
    branches: [main]
    paths:
      - "homelab/RPI-srv/docker-compose.yml"
      - "homelab/RPI-srv/webapp/**"
      - "homelab/RPI-srv/nginx-wg.conf"
      - "homelab/RPI-srv/notes-app/**"
      - "homelab/RPI-srv/discord-weather/**"
      - "homelab/RPI-srv/discord-healthdigest/**"
      - "homelab/RPI-srv/discord-jellyfin/**"
      - "homelab/RPI-srv/discord-sports/**"
      - "homelab/RPI-srv/discord-hltv/**"
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: [self-hosted, ARM64]   # pin to the Pi (ARM64); bare 'self-hosted' also matched opti (x86_64)
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file
        run: |
          cp "$GITHUB_WORKSPACE/homelab/RPI-srv/docker-compose.yml" /srv/docker/compose/docker-compose.yml

      - name: Copy webapp and nginx config
        run: |
          mkdir -p /srv/docker/compose/webapp
          cp -r "$GITHUB_WORKSPACE/homelab/RPI-srv/webapp/." /srv/docker/compose/webapp/
          cp "$GITHUB_WORKSPACE/homelab/RPI-srv/nginx-wg.conf" /srv/docker/compose/nginx-wg.conf

      - name: Copy notes-app
        run: |
          mkdir -p /srv/docker/compose/notes-app/api
          mkdir -p /srv/docker/compose/notes-app/web
          cp -r "$GITHUB_WORKSPACE/homelab/RPI-srv/notes-app/api/." /srv/docker/compose/notes-app/api/
          cp -r "$GITHUB_WORKSPACE/homelab/RPI-srv/notes-app/web/." /srv/docker/compose/notes-app/web/

      - name: Copy discord bots
        # must run before "Bring stack up" — compose references these build contexts
        run: |
          for bot in discord-weather discord-healthdigest discord-jellyfin discord-sports discord-hltv; do
            mkdir -p "/srv/docker/compose/$bot"
            cp -r "$GITHUB_WORKSPACE/homelab/RPI-srv/$bot/." "/srv/docker/compose/$bot/"
          done

      - name: Pull latest images
        working-directory: /srv/docker/compose
        run: docker compose pull

      - name: Bring stack up
        working-directory: /srv/docker/compose
        run: docker compose up -d --remove-orphans

      - name: Restart webapp to pick up code changes
        working-directory: /srv/docker/compose
        run: docker compose restart webapp

      - name: Build and restart notes-api
        working-directory: /srv/docker/compose
        run: |
          docker compose build notes-api
          docker compose up -d notes-api

      - name: Build and restart discord bots
        working-directory: /srv/docker/compose
        run: |
          docker compose build discord-weather discord-healthdigest discord-jellyfin discord-sports discord-hltv
          docker compose up -d discord-weather discord-healthdigest discord-jellyfin discord-sports discord-hltv

      - name: Restart nginx to pick up config changes
        working-directory: /srv/docker/compose
        run: docker compose restart nginx-webapp