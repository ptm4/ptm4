<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Homelab — Architecture &amp; Flows</title>
<style>
  :root{
    --bg:#0f1117; --surface:#1a1d27; --surface2:#20232f; --border:#2a2d3a;
    --text:#e2e4ed; --muted:#7a7f99; --accent:#e0b44a;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;}
  a{color:inherit;}
  #back{position:fixed;top:14px;left:14px;z-index:20;background:var(--surface2);border:1px solid var(--border);
    color:var(--text);padding:6px 12px;border-radius:6px;text-decoration:none;font-size:12px;}
  #back:hover{border-color:var(--accent);}
  header.page-head{padding:56px 24px 12px;max-width:1100px;position:relative;}
  header.page-head h1{font-size:19px;margin-bottom:6px;}
  header.page-head p{color:var(--muted);max-width:820px;line-height:1.5;}
  header.page-head b{color:var(--text);}

  #sync-bar{position:fixed;top:14px;right:24px;z-index:20;display:flex;align-items:center;gap:10px;}
  #sync-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);
    padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;}
  #sync-btn:hover{border-color:var(--accent);}
  #sync-btn:disabled{opacity:.5;cursor:default;}
  #sync-status{font-size:11px;color:var(--muted);text-align:right;}
  #sync-status .warn{color:var(--accent);}
  #sync-status .crit{color:#e05c5c;}

  .legend{display:flex;gap:18px;flex-wrap:wrap;padding:0 24px 16px;font-size:11px;color:var(--muted);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .swatch{width:10px;height:10px;border-radius:2px;display:inline-block;}

  .layout{display:flex;gap:16px;padding:0 24px 40px;align-items:flex-start;}
  #diagram-wrap{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;
    overflow:auto;padding:12px;}
  svg{display:block;}

  .node-box{fill:var(--surface2);stroke:var(--border);stroke-width:1.4;rx:6;}
  .node-box.dim{opacity:.35;}
  .node-box.hl{stroke-width:2.4;}
  .node-label{fill:var(--text);font-size:11.5px;font-weight:600;pointer-events:none;}
  .node-sub{fill:var(--muted);font-size:9.5px;pointer-events:none;}
  .node-sub.dim, .node-label.dim{opacity:.35;}
  .col-label{fill:var(--muted);font-size:10px;letter-spacing:.6px;font-weight:600;}
  .col-live{font-size:9.5px;}
  .col-live.ok{fill:#4caf7d;}
  .col-live.warn{fill:#e0b44a;}
  .col-live.critical{fill:#e05c5c;}
  .col-live.unknown{fill:var(--muted);}

  .live-dot{stroke:var(--bg);stroke-width:1.2;}
  .live-dot.up{fill:#4caf7d;}
  .live-dot.down{fill:#e05c5c;}

  .edge{fill:none;stroke:var(--border);stroke-width:1.3;opacity:.55;}
  .edge.hl{stroke:var(--accent);stroke-width:2.4;opacity:1;}
  .edge-arrow{fill:var(--border);opacity:.55;}
  .edge-arrow.hl{fill:var(--accent);opacity:1;}

  .step-badge circle{fill:var(--accent);stroke:var(--bg);stroke-width:2;}
  .step-badge text{fill:#1a1508;font-size:10px;font-weight:700;text-anchor:middle;dominant-baseline:central;}

  aside{width:340px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .panel h2{font-size:10px;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;}
  .flow-item{display:block;width:100%;text-align:left;background:transparent;border:1px solid transparent;
    border-radius:8px;padding:9px 10px;cursor:pointer;color:var(--text);margin-bottom:2px;}
  .flow-item:hover{background:var(--surface2);}
  .flow-item.active{background:#2a2408;border-color:var(--accent);}
  .flow-item .fname{font-weight:600;font-size:12.5px;}
  .flow-item .fdesc{color:var(--muted);font-size:11px;margin-top:3px;line-height:1.4;}
  .clear-btn{margin-top:6px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:11.5px;
    text-decoration:underline;padding:4px 10px;}
  .clear-btn:hover{color:var(--text);}

  #steps .step{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
  #steps .step:last-child{border-bottom:none;}
  .step-num{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#1a1508;
    font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .step-body b{display:block;font-size:12px;margin-bottom:3px;}
  .step-body span{color:var(--muted);font-size:11.5px;line-height:1.45;}
  #steps-empty{color:var(--muted);font-size:12px;line-height:1.5;}

  @media (max-width: 900px){
    .layout{flex-direction:column;}
    aside{width:100%;}
  }
</style>
</head>
<body>
  <a id="back" href="/">&larr; Dashboard</a>

  <div id="sync-bar">
    <span id="sync-status">Not synced yet</span>
    <button id="sync-btn">⟳ Sync from agent reports</button>
  </div>

  <header class="page-head">
    <h1 id="title"></h1>
    <p id="subtitle"></p>
  </header>

  <div class="legend" id="legend"></div>

  <div class="layout">
    <div id="diagram-wrap">
      <svg id="diagram" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <aside>
      <div class="panel">
        <h2>Flows</h2>
        <div id="flow-list"></div>
        <button class="clear-btn" id="clear-flow">Clear selection</button>
      </div>
      <div class="panel">
        <h2>Steps</h2>
        <div id="steps"><div id="steps-empty">Select a flow to trace its path through the diagram — each hop lights up in order below.</div></div>
      </div>
    </aside>
  </div>

<script>
const SVG_NS = 'http://www.w3.org/2000/svg';
const COL_W = 210, COL_GAP = 40, NODE_W = 178, NODE_H_MIN = 44, ROW_GAP = 14, TOP_PAD = 30, LEFT_PAD = 10;

let DATA = null, nodePos = {}, activeFlow = null, liveData = null;

// Which host a column's live status pill should show.
const COLUMN_HOST = { edge: 'rpi', rpiapps: 'rpi', opti: 'opti', media: 'noblenumbat', android: 'android' };

// Node id -> exact docker container name(s) to look up in the live doctor report.
// Nodes not listed here (systemd timers, GH runners, phone hardware, opti has no docker, …)
// simply get no liveness dot.
const NODE_CONTAINERS = {
  'pihole': ['pihole'],
  'nginx-bitwarden': ['nginx-bitwarden'],
  'nginx-webapp': ['nginx-webapp'],
  'vaultwarden': ['bitwarden'],
  'mariadb': ['bitwarden-db'],
  'webapp-backend': ['webapp'],
  'notes-api': ['notes-api'],
  'discord-bots': ['discord-weather', 'discord-healthdigest', 'discord-jellyfin', 'discord-sports', 'discord-hltv'],
  'jellyfin': ['jellyfin'],
  'arr-stack': ['radarr', 'sonarr', 'lidarr', 'bazarr'],
  'prowlarr': ['prowlarr'],
  'qbittorrent': ['qbittorrent'],
  'gluetun': ['gluetun'],
  'mylar-kavita': ['mylar3', 'kavita'],
  'portainer-wt': ['portainer', 'watchtower'],
};

fetch('data.json').then(r => r.json()).then(data => {
  DATA = data;
  document.getElementById('title').textContent = data.meta.title;
  document.getElementById('subtitle').innerHTML = data.meta.subtitle;
  renderLegend();
  renderFlowList();
  layout();
  draw();
});

document.getElementById('sync-btn').addEventListener('click', sync);

async function sync(){
  const btn = document.getElementById('sync-btn');
  const status = document.getElementById('sync-status');
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '⟳ Syncing…';
  try {
    const res = await fetch('/api/architecture/live');
    if(!res.ok) throw new Error('HTTP ' + res.status);
    liveData = await res.json();
    const runAt = liveData.run_at ? new Date(liveData.run_at).toLocaleString() : 'unknown';
    const cls = (liveData.doctor_summary || '').includes('critical') ? 'crit'
      : (liveData.doctor_summary || '').match(/flag/) ? 'warn' : '';
    status.innerHTML = `Reports as of <b>${runAt}</b>${liveData.doctor_summary ? ` — <span class="${cls}">${liveData.doctor_summary}</span>` : ''}`;
    draw();
  } catch (e) {
    status.innerHTML = `<span class="crit">Sync failed: ${e.message}</span>`;
  }
  btn.disabled = false;
  btn.textContent = orig;
}

function renderLegend(){
  const el = document.getElementById('legend');
  el.innerHTML = DATA.legend.map(l =>
    `<span><span class="swatch" style="background:${l.color}"></span>${l.label}</span>`
  ).join('');
}

function renderFlowList(){
  const el = document.getElementById('flow-list');
  el.innerHTML = DATA.flows.map(f =>
    `<button class="flow-item" data-flow="${f.id}">
      <div class="fname">${f.name}</div>
      <div class="fdesc">${f.description}</div>
    </button>`
  ).join('');
  el.querySelectorAll('.flow-item').forEach(btn => {
    btn.addEventListener('click', () => selectFlow(btn.dataset.flow));
  });
  document.getElementById('clear-flow').addEventListener('click', () => selectFlow(null));
}

function catColor(cat){
  const l = DATA.legend.find(x => x.key === cat);
  return l ? l.color : '#7a7f99';
}

function layout(){
  const colIndex = {};
  DATA.columns.forEach((c, i) => colIndex[c.id] = i);

  const byCol = {};
  DATA.columns.forEach(c => byCol[c.id] = []);
  DATA.nodes.forEach(n => byCol[n.column].push(n));

  nodePos = {};
  DATA.columns.forEach(col => {
    const x = LEFT_PAD + colIndex[col.id] * (COL_W + COL_GAP);
    let y = TOP_PAD + 20;
    byCol[col.id].forEach(n => {
      const lines = wrapText(n.sublabel || '', 27);
      const h = NODE_H_MIN + Math.max(0, lines.length - 1) * 11;
      nodePos[n.id] = { x, y, w: NODE_W, h, node: n, subLines: lines };
      y += h + ROW_GAP;
    });
  });
}

function wrapText(str, maxChars){
  if(!str) return [];
  const words = str.split(' ');
  const lines = [];
  let cur = '';
  words.forEach(w => {
    const test = cur ? cur + ' ' + w : w;
    if(test.length > maxChars && cur){ lines.push(cur); cur = w; }
    else cur = test;
  });
  if(cur) lines.push(cur);
  return lines.slice(0, 3);
}

function anchor(id, side){
  const p = nodePos[id];
  if(side === 'right') return { x: p.x + p.w, y: p.y + p.h/2 };
  if(side === 'left')  return { x: p.x, y: p.y + p.h/2 };
  return { x: p.x + p.w/2, y: p.y + p.h/2 };
}

function edgePath(e){
  const a = nodePos[e.from], b = nodePos[e.to];
  const forward = b.x >= a.x;
  const from = forward ? anchor(e.from, 'right') : anchor(e.from, 'left');
  const to   = forward ? anchor(e.to, 'left')    : anchor(e.to, 'right');
  const dx = Math.max(40, Math.abs(to.x - from.x) * 0.5) * (forward ? 1 : -1);
  const c1x = from.x + dx, c1y = from.y;
  const c2x = to.x - dx,   c2y = to.y;
  return { d: `M ${from.x} ${from.y} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${to.x} ${to.y}`, from, to };
}

function bezierPoint(from, c1, c2, to, t){
  const mt = 1 - t;
  const x = mt*mt*mt*from.x + 3*mt*mt*t*c1.x + 3*mt*t*t*c2.x + t*t*t*to.x;
  const y = mt*mt*mt*from.y + 3*mt*mt*t*c1.y + 3*mt*t*t*c2.y + t*t*t*to.y;
  return {x, y};
}

function draw(){
  const svg = document.getElementById('diagram');
  svg.innerHTML = '';

  let maxX = 0, maxY = 0;
  Object.values(nodePos).forEach(p => {
    maxX = Math.max(maxX, p.x + p.w);
    maxY = Math.max(maxY, p.y + p.h);
  });
  const width = maxX + LEFT_PAD, height = maxY + 30;
  svg.setAttribute('width', width);
  svg.setAttribute('height', height);
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);

  // column labels
  const colIndex = {};
  DATA.columns.forEach((c,i) => colIndex[c.id]=i);
  DATA.columns.forEach(col => {
    const x = LEFT_PAD + colIndex[col.id] * (COL_W + COL_GAP);
    const t = document.createElementNS(SVG_NS, 'text');
    t.setAttribute('x', x); t.setAttribute('y', TOP_PAD);
    t.setAttribute('class', 'col-label');
    t.textContent = col.label;
    svg.appendChild(t);

    const hostName = COLUMN_HOST[col.id];
    const hostLive = hostName && liveData && liveData.hosts[hostName];
    if(hostLive){
      const lt = document.createElementNS(SVG_NS, 'text');
      lt.setAttribute('x', x); lt.setAttribute('y', TOP_PAD + 12);
      const st = hostLive.doctor_status || hostLive.status || 'unknown';
      lt.setAttribute('class', 'col-live ' + st);
      const bits = [];
      if(hostLive.disk_used_pct != null) bits.push(`disk ${hostLive.disk_used_pct}%`);
      if(hostLive.uptime) bits.push(`up ${hostLive.uptime}`);
      if(hostLive.pool) bits.push(`pool ${hostLive.pool.used_pct}%`);
      lt.textContent = `● ${st}` + (bits.length ? ' · ' + bits.join(' · ') : '');
      svg.appendChild(lt);
    }
  });

  const flowEdgeIds = activeFlow ? activeFlow.steps.map(s => s.edge) : [];
  const flowNodeIds = new Set();
  if(activeFlow){
    activeFlow.steps.forEach(s => {
      const e = DATA.edges.find(x => x.id === s.edge);
      if(e){ flowNodeIds.add(e.from); flowNodeIds.add(e.to); }
    });
  }

  const defs = document.createElementNS(SVG_NS, 'defs');
  svg.appendChild(defs);

  // edges (draw non-highlighted first, highlighted on top)
  const edgesSorted = [...DATA.edges].sort((a,b) => {
    const ai = flowEdgeIds.indexOf(a.id), bi = flowEdgeIds.indexOf(b.id);
    return (ai === -1 ? -1 : 1) - (bi === -1 ? -1 : 1);
  });

  const midpoints = {};
  edgesSorted.forEach(e => {
    const { d, from, to } = edgePath(e);
    const isHl = flowEdgeIds.includes(e.id);
    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('d', d);
    path.setAttribute('class', 'edge' + (isHl ? ' hl' : ''));
    svg.appendChild(path);

    // arrowhead near target
    const forward = to.x >= from.x;
    const angle = Math.atan2(to.y - from.y, forward ? 1 : -1) ; // approx direction
    const dx = forward ? -8 : 8;
    const arrow = document.createElementNS(SVG_NS, 'polygon');
    const ax = to.x, ay = to.y;
    const pts = forward
      ? `${ax},${ay} ${ax-8},${ay-4} ${ax-8},${ay+4}`
      : `${ax},${ay} ${ax+8},${ay-4} ${ax+8},${ay+4}`;
    arrow.setAttribute('points', pts);
    arrow.setAttribute('class', 'edge-arrow' + (isHl ? ' hl' : ''));
    svg.appendChild(arrow);

    if(isHl){
      const a = nodePos[e.from], b = nodePos[e.to];
      const fwd = b.x >= a.x;
      const c1 = { x: from.x + Math.max(40, Math.abs(to.x-from.x)*0.5) * (fwd?1:-1), y: from.y };
      const c2 = { x: to.x - Math.max(40, Math.abs(to.x-from.x)*0.5) * (fwd?1:-1), y: to.y };
      midpoints[e.id] = bezierPoint(from, c1, c2, to, 0.5);
    }
  });

  // nodes
  DATA.nodes.forEach(n => {
    const p = nodePos[n.id];
    const isDim = activeFlow && !flowNodeIds.has(n.id);
    const isHl = activeFlow && flowNodeIds.has(n.id);
    const g = document.createElementNS(SVG_NS, 'g');

    const rect = document.createElementNS(SVG_NS, 'rect');
    rect.setAttribute('x', p.x); rect.setAttribute('y', p.y);
    rect.setAttribute('width', p.w); rect.setAttribute('height', p.h);
    rect.setAttribute('rx', 6);
    rect.setAttribute('class', 'node-box' + (isDim ? ' dim' : '') + (isHl ? ' hl' : ''));
    rect.style.stroke = isHl ? catColor(n.category) : '';
    g.appendChild(rect);

    const accent = document.createElementNS(SVG_NS, 'rect');
    accent.setAttribute('x', p.x); accent.setAttribute('y', p.y);
    accent.setAttribute('width', 3); accent.setAttribute('height', p.h);
    accent.setAttribute('fill', catColor(n.category));
    accent.setAttribute('opacity', isDim ? 0.35 : 1);
    g.appendChild(accent);

    const label = document.createElementNS(SVG_NS, 'text');
    label.setAttribute('x', p.x + 12); label.setAttribute('y', p.y + 17);
    label.setAttribute('class', 'node-label' + (isDim ? ' dim' : ''));
    label.textContent = n.label;
    g.appendChild(label);

    p.subLines.forEach((line, i) => {
      const sub = document.createElementNS(SVG_NS, 'text');
      sub.setAttribute('x', p.x + 12); sub.setAttribute('y', p.y + 31 + i*11);
      sub.setAttribute('class', 'node-sub' + (isDim ? ' dim' : ''));
      sub.textContent = line;
      g.appendChild(sub);
    });

    svg.appendChild(g);
  });

  // step badges on top
  if(activeFlow){
    activeFlow.steps.forEach((s, i) => {
      const pt = midpoints[s.edge];
      if(!pt) return;
      const g = document.createElementNS(SVG_NS, 'g');
      g.setAttribute('class', 'step-badge');
      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('cx', pt.x); c.setAttribute('cy', pt.y); c.setAttribute('r', 9);
      const t = document.createElementNS(SVG_NS, 'text');
      t.setAttribute('x', pt.x); t.setAttribute('y', pt.y+1);
      t.textContent = i + 1;
      g.appendChild(c); g.appendChild(t);
      svg.appendChild(g);
    });
  }
}

function selectFlow(id){
  activeFlow = id ? DATA.flows.find(f => f.id === id) : null;
  document.querySelectorAll('.flow-item').forEach(b => b.classList.toggle('active', b.dataset.flow === id));
  renderSteps();
  draw();
}

function renderSteps(){
  const el = document.getElementById('steps');
  if(!activeFlow){
    el.innerHTML = '<div id="steps-empty">Select a flow to trace its path through the diagram — each hop lights up in order below.</div>';
    return;
  }
  el.innerHTML = activeFlow.steps.map((s, i) =>
    `<div class="step">
      <div class="step-num">${i+1}</div>
      <div class="step-body"><b>${s.title}</b><span>${s.detail}</span></div>
    </div>`
  ).join('');
}
</script>
</body>
</html>
