trigger: none

variables:
  workingDirectory: '$(System.DefaultWorkingDirectory)/PowerShell/Peters Spellbook/Terraform/Policy/exemptions/PI-Public-Network-Access'

stages:
- stage: PolicyExemptions
  displayName: 'Policy Exemptions — PI-Public-Network-Access'
  jobs:

  # ────────────────────────────────────────────────────────────────────────────
  - job: Plan
    displayName: 'Terraform Plan'
    pool:
      name: 'Infra-Pool'
      demands:
        - Agent.Name -equals vm-infra-pool2
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDirectory)'
        backendAzureRmUseEnvironmentVariablesForAuthentication: false
        backendAzureRmUseEntraIdForAuthentication: true
        backendServiceArm: 'sub-JLB-hub(a1b2c3d4-1111-4000-8000-111111111111)'
        backendAzureRmResourceGroupName: 'rg-JLB-Hub-Terraform'
        backendAzureRmStorageAccountName: 'jlbstorage'
        backendAzureRmContainerName: 'terraform'
        backendAzureRmKey: 'policy/pi-public-network-access.tfstate'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(workingDirectory)'
        commandOptions: '-out=$(System.DefaultWorkingDirectory)/tfplan'
        environmentServiceNameAzureRM: 'sub-JLB-hub(a1b2c3d4-1111-4000-8000-111111111111)'

    - publish: '$(System.DefaultWorkingDirectory)/tfplan'
      artifact: tfplan

  # ────────────────────────────────────────────────────────────────────────────
  - job: WaitForApproval
    displayName: 'Manual Approval'
    dependsOn: Plan
    pool: server
    steps:
    - task: ManualValidation@1
      timeoutInMinutes: 60
      inputs:
        notifyUsers: 'nnumbat@jammylab.com'
        instructions: |
          Review the Terraform plan for PI-Public-Network-Access exemptions.

          State key : policy/pi-public-network-access.tfstate
          Config    : PowerShell/Peters Spellbook/Terraform/Policy/exemptions/PI-Public-Network-Access

          Approve to apply, Reject to cancel.
        onTimeout: 'reject'

  # ────────────────────────────────────────────────────────────────────────────
  - job: Apply
    displayName: 'Terraform Apply'
    dependsOn: WaitForApproval
    pool:
      name: 'Infra-Pool'
      demands:
        - Agent.Name -equals vm-infra-pool2
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDirectory)'
        backendAzureRmUseEnvironmentVariablesForAuthentication: false
        backendAzureRmUseEntraIdForAuthentication: true
        backendServiceArm: 'sub-JLB-hub(a1b2c3d4-1111-4000-8000-111111111111)'
        backendAzureRmResourceGroupName: 'rg-JLB-Hub-Terraform'
        backendAzureRmStorageAccountName: 'jlbstorage'
        backendAzureRmContainerName: 'terraform'
        backendAzureRmKey: 'policy/pi-public-network-access.tfstate'

    - download: current
      artifact: tfplan

    - task: TerraformTaskV4@4
      displayName: 'Terraform Apply'
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(workingDirectory)'
        commandOptions: '$(Pipeline.Workspace)/tfplan/tfplan'
        environmentServiceNameAzureRM: 'sub-JLB-hub(a1b2c3d4-1111-4000-8000-111111111111)'
