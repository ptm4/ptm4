#compose
#

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  samba:
    image: dperson/samba
    container_name: samba
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "192.168.1.10:445:445"  # Bind to rpi
    environment:
      - USERID=1000
      - GROUPID=1003
    volumes:
      - /srv/fs-merged:/share
      - samba_etc:/etc
      - samba_run:/run/samba
      - samba_cache:/var/cache/samba
      - samba_lib:/var/lib/samba
      - samba_log:/var/log/samba
    entrypoint: ["/sbin/tini", "--", "/usr/bin/samba.sh"]
    command: ["-u", "${SAMBA_USER};${SAMBA_PASSWORD}", "-s", "FS;/share;yes;no;no;${SAMBA_USER}"]
    healthcheck:
      test: ["CMD-SHELL", "smbclient -L \\\\localhost -U % -m SMB3"]
      interval: 60s
      timeout: 15s
      retries: 3


  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    logging: *default-logging
    network_mode: "host"          # Host mode required for DHCP/DNS
    environment:
      TZ: "America/New_York"
      FTLCONF_webserver_api_password: ${PIHOLE_WEB_PASSWORD}
      FTLCONF_dns_upstreams: "192.168.1.1;1.1.1.1"
    volumes:
      - pihole_data:/etc/pihole
      - dnsmasq_data:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN                  # Needed for DHCP
      - SYS_NICE                   # Suppress FTL process priority warning

  mariadb:
    image: mariadb:11
    container_name: bitwarden-db
    restart: unless-stopped
    stop_grace_period: 60s
    logging: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./bitwarden-db/data:/var/lib/mysql
    networks:
      - internal
  bitwarden:
    image: vaultwarden/server:latest
    container_name: bitwarden
    restart: unless-stopped
    logging: *default-logging
    environment:
      WEBSOCKET_ENABLED: "true"
      SIGNUPS_ALLOWED: "true"
      BITWARDEN_SMTP_ENABLED: "false"
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@bitwarden-db:3306/${MYSQL_DATABASE}"
      DOMAIN: ${VAULTWARDEN_DOMAIN}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
    depends_on:
      - mariadb
    networks:
      - internal
    expose:
      - "80"   # expose internally to NGINX, not host
    volumes:
      - ./vaultwarden-data:/data

  nginx-proxy:
    image: nginx:stable-alpine
    container_name: nginx-bitwarden
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "443:443"   # HTTPS for LAN clients
    volumes:
      - ./certs/bitwarden.rpi.lan.pem:/etc/ssl/certs/bitwarden.crt:ro
      - ./certs/bitwarden.rpi.lan-key.pem:/etc/ssl/private/bitwarden.key:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bitwarden
    networks:
      - internal

  notes-api:
    build: ./notes-app/api
    container_name: notes-api
    restart: unless-stopped
    logging: *default-logging
    environment:
      DATA_DIR: /data
      PORT: 3002
    volumes:
      - ./notes-app/api/index.js:/app/index.js:ro
      - notes_data:/data
    ports:
      - "192.168.1.10:3002:3002"   # direct HTTP for mobile (avoids self-signed cert issue)
    networks:
      - internal

  webapp:
    image: node:lts-alpine
    container_name: webapp
    restart: unless-stopped
    logging: *default-logging
    working_dir: /app/backend
    command: sh -c "npm install --omit=dev && node index.js"
    volumes:
      - ./webapp:/app
    expose:
      - "3000"
    networks:
      - internal

  nginx-webapp:
    image: nginx:stable-alpine
    container_name: nginx-webapp
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "192.168.1.10:8443:443"
    volumes:
      - /srv/fs-merged/ptm/certs/webapp.rpi.lan.pem:/etc/ssl/certs/webapp.crt:ro
      - /srv/fs-merged/ptm/certs/webapp.rpi.lan-key.pem:/etc/ssl/private/webapp.key:ro
      - ./nginx-wg.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webapp
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  notes_data:
  samba_etc:
  samba_run:
  samba_cache:
  samba_lib:
  samba_log:
  pihole_data:
  dnsmasq_data:
  db_data: